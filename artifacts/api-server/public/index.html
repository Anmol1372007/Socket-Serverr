<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Socket.IO Chat</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0f1115;
        --panel: #171a21;
        --border: #262a33;
        --text: #e6e8ec;
        --muted: #8b93a1;
        --accent: #6ea8fe;
        --self: #2b6cb0;
        --other: #2d3038;
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Helvetica, Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .app {
        width: 100%;
        max-width: 920px;
        height: 100vh;
        display: grid;
        grid-template-columns: 220px 1fr;
        background: var(--panel);
        border-left: 1px solid var(--border);
        border-right: 1px solid var(--border);
      }
      aside {
        border-right: 1px solid var(--border);
        padding: 16px;
        overflow-y: auto;
      }
      aside h2 {
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
        margin: 0 0 12px;
      }
      .users { list-style: none; padding: 0; margin: 0; }
      .users li {
        padding: 6px 8px;
        border-radius: 6px;
        font-size: 14px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .dot {
        width: 8px; height: 8px; border-radius: 50%;
        background: #4ade80;
      }
      main {
        display: flex;
        flex-direction: column;
        min-width: 0;
      }
      header {
        padding: 14px 18px;
        border-bottom: 1px solid var(--border);
        font-weight: 600;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      header .status {
        font-size: 12px;
        color: var(--muted);
        font-weight: 400;
      }
      .messages {
        flex: 1;
        overflow-y: auto;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .msg {
        max-width: 75%;
        padding: 8px 12px;
        border-radius: 12px;
        background: var(--other);
        word-wrap: break-word;
      }
      .msg .meta {
        font-size: 11px;
        color: var(--muted);
        margin-bottom: 2px;
      }
      .msg.self {
        align-self: flex-end;
        background: var(--self);
      }
      .msg.system {
        align-self: center;
        background: transparent;
        color: var(--muted);
        font-size: 12px;
        font-style: italic;
      }
      .typing {
        padding: 0 18px 6px;
        font-size: 12px;
        color: var(--muted);
        min-height: 18px;
      }
      form {
        display: flex;
        gap: 8px;
        padding: 12px;
        border-top: 1px solid var(--border);
      }
      input, button {
        font: inherit;
        padding: 10px 12px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: #0f1115;
        color: var(--text);
        outline: none;
      }
      input { flex: 1; }
      input:focus { border-color: var(--accent); }
      button {
        background: var(--accent);
        color: #0a0d12;
        border-color: var(--accent);
        font-weight: 600;
        cursor: pointer;
      }
      button:disabled { opacity: 0.5; cursor: not-allowed; }
      .join {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.6);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .join .card {
        background: var(--panel);
        border: 1px solid var(--border);
        padding: 24px;
        border-radius: 12px;
        width: 320px;
      }
      .join h1 { margin: 0 0 12px; font-size: 18px; }
      .join p { margin: 0 0 16px; color: var(--muted); font-size: 13px; }
      .join form { padding: 0; border: none; }
      @media (max-width: 640px) {
        aside { display: none; }
        .app { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <aside>
        <h2>Online</h2>
        <ul class="users" id="users"></ul>
      </aside>
      <main>
        <header>
          <span>Socket.IO Chat</span>
          <span class="status" id="status">connecting…</span>
        </header>
        <div class="messages" id="messages"></div>
        <div class="typing" id="typing"></div>
        <form id="form">
          <input
            id="input"
            autocomplete="off"
            placeholder="Type a message…"
            disabled
          />
          <button type="submit" disabled>Send</button>
        </form>
      </main>
    </div>

    <div class="join" id="join">
      <div class="card">
        <h1>Join the chat</h1>
        <p>Pick a display name to start chatting in real time.</p>
        <form id="joinForm">
          <input id="username" placeholder="Your name" maxlength="32" required />
          <button type="submit">Join</button>
        </form>
      </div>
    </div>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script>
      const socket = io();
      const messagesEl = document.getElementById("messages");
      const usersEl = document.getElementById("users");
      const statusEl = document.getElementById("status");
      const typingEl = document.getElementById("typing");
      const form = document.getElementById("form");
      const input = document.getElementById("input");
      const sendBtn = form.querySelector("button");
      const joinOverlay = document.getElementById("join");
      const joinForm = document.getElementById("joinForm");
      const usernameInput = document.getElementById("username");

      let me = null;
      const typers = new Set();

      function escapeHtml(s) {
        return s.replace(/[&<>"']/g, (c) => ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#39;",
        })[c]);
      }

      function fmtTime(ts) {
        const d = new Date(ts);
        return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
      }

      function appendMessage(msg) {
        const div = document.createElement("div");
        const isSelf = msg.user === me;
        div.className = "msg" + (isSelf ? " self" : "");
        div.innerHTML =
          '<div class="meta">' +
          escapeHtml(msg.user) +
          " · " +
          fmtTime(msg.timestamp) +
          "</div>" +
          escapeHtml(msg.text);
        messagesEl.appendChild(div);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      function appendSystem(text) {
        const div = document.createElement("div");
        div.className = "msg system";
        div.textContent = text;
        messagesEl.appendChild(div);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      function renderTyping() {
        const list = Array.from(typers);
        if (list.length === 0) {
          typingEl.textContent = "";
        } else if (list.length === 1) {
          typingEl.textContent = list[0] + " is typing…";
        } else {
          typingEl.textContent = list.join(", ") + " are typing…";
        }
      }

      socket.on("connect", () => {
        statusEl.textContent = "connected";
      });
      socket.on("disconnect", () => {
        statusEl.textContent = "disconnected";
        input.disabled = true;
        sendBtn.disabled = true;
      });

      socket.on("history", (history) => {
        messagesEl.innerHTML = "";
        history.forEach(appendMessage);
      });

      socket.on("message", appendMessage);
      socket.on("system", appendSystem);

      socket.on("users", (users) => {
        usersEl.innerHTML = "";
        users.forEach((u) => {
          const li = document.createElement("li");
          li.innerHTML =
            '<span class="dot"></span>' +
            escapeHtml(u) +
            (u === me ? " (you)" : "");
          usersEl.appendChild(li);
        });
      });

      socket.on("typing", ({ user, isTyping }) => {
        if (isTyping) typers.add(user);
        else typers.delete(user);
        renderTyping();
      });

      joinForm.addEventListener("submit", (e) => {
        e.preventDefault();
        const name = usernameInput.value.trim();
        if (!name) return;
        me = name;
        socket.emit("join", name);
        joinOverlay.style.display = "none";
        input.disabled = false;
        sendBtn.disabled = false;
        input.focus();
      });

      let typingTimeout;
      input.addEventListener("input", () => {
        socket.emit("typing", true);
        clearTimeout(typingTimeout);
        typingTimeout = setTimeout(() => socket.emit("typing", false), 1200);
      });

      form.addEventListener("submit", (e) => {
        e.preventDefault();
        const text = input.value.trim();
        if (!text) return;
        socket.emit("message", text);
        socket.emit("typing", false);
        input.value = "";
      });
    </script>
  </body>
</html>
