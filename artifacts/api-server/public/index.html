<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Crisis Response — Guest SOS</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0a0d12;
        --panel: #11151c;
        --panel-2: #161b24;
        --border: #232a36;
        --text: #e6e8ec;
        --muted: #8a93a3;
        --red: #ef2b3a;
        --red-deep: #b3131e;
        --red-glow: rgba(239, 43, 58, 0.45);
        --green: #22c55e;
        --amber: #f59e0b;
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont,
          "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background:
          radial-gradient(1200px 600px at 50% -10%, #1a0a0d 0%, transparent 60%),
          var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 22px;
        border-bottom: 1px solid var(--border);
        background: rgba(0, 0, 0, 0.3);
        backdrop-filter: blur(6px);
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        font-size: 13px;
      }
      .brand .pulse {
        width: 10px; height: 10px; border-radius: 50%;
        background: var(--red);
        box-shadow: 0 0 0 0 var(--red-glow);
        animation: pulse 1.6s ease-out infinite;
      }
      @keyframes pulse {
        0% { box-shadow: 0 0 0 0 var(--red-glow); }
        70% { box-shadow: 0 0 0 14px rgba(239,43,58,0); }
        100% { box-shadow: 0 0 0 0 rgba(239,43,58,0); }
      }
      .topbar a {
        color: var(--muted);
        text-decoration: none;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        border: 1px solid var(--border);
        padding: 6px 12px;
        border-radius: 6px;
      }
      .topbar a:hover { color: var(--text); border-color: #3a4252; }

      main {
        flex: 1;
        display: grid;
        place-items: center;
        padding: 32px 20px;
      }
      .card {
        width: 100%;
        max-width: 520px;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 28px 28px 32px;
        text-align: center;
        position: relative;
        overflow: hidden;
      }
      .card::before {
        content: "";
        position: absolute;
        inset: 0 0 auto 0;
        height: 3px;
        background: linear-gradient(90deg, transparent, var(--red), transparent);
      }
      h1 {
        margin: 0 0 6px;
        font-size: 22px;
        letter-spacing: 0.02em;
      }
      .subtitle {
        margin: 0 0 22px;
        color: var(--muted);
        font-size: 14px;
      }
      .field {
        text-align: left;
        margin-bottom: 22px;
      }
      .field label {
        display: block;
        font-size: 11px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 6px;
      }
      .field input {
        width: 100%;
        font: inherit;
        font-size: 18px;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        padding: 14px 14px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: var(--panel-2);
        color: var(--text);
        outline: none;
        text-align: center;
      }
      .field input:focus {
        border-color: var(--red);
        box-shadow: 0 0 0 3px rgba(239, 43, 58, 0.18);
      }

      .sos {
        display: block;
        width: 240px;
        height: 240px;
        margin: 8px auto 18px;
        border-radius: 50%;
        border: none;
        cursor: pointer;
        font-family: inherit;
        font-weight: 900;
        font-size: 28px;
        letter-spacing: 0.12em;
        color: white;
        text-transform: uppercase;
        background:
          radial-gradient(circle at 30% 25%, #ff5562 0%, var(--red) 45%, var(--red-deep) 100%);
        box-shadow:
          0 0 0 6px rgba(239, 43, 58, 0.18),
          0 0 60px 4px rgba(239, 43, 58, 0.45),
          inset 0 -10px 30px rgba(0, 0, 0, 0.35),
          inset 0 6px 14px rgba(255, 255, 255, 0.18);
        transition: transform 80ms ease, box-shadow 200ms ease;
        position: relative;
      }
      .sos:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
      .sos:not(:disabled):hover {
        transform: translateY(-2px) scale(1.02);
        box-shadow:
          0 0 0 8px rgba(239, 43, 58, 0.22),
          0 0 80px 6px rgba(239, 43, 58, 0.55),
          inset 0 -10px 30px rgba(0, 0, 0, 0.35),
          inset 0 6px 14px rgba(255, 255, 255, 0.22);
      }
      .sos:not(:disabled):active {
        transform: translateY(0) scale(0.98);
      }
      .sos small {
        display: block;
        margin-top: 6px;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.2em;
        opacity: 0.85;
      }
      .help {
        font-size: 12px;
        color: var(--muted);
        margin: 0;
      }
      .toast {
        margin-top: 16px;
        padding: 12px 14px;
        border-radius: 10px;
        background: rgba(34, 197, 94, 0.12);
        border: 1px solid rgba(34, 197, 94, 0.4);
        color: #b7f7c8;
        font-size: 13px;
        display: none;
      }
      .toast.show { display: block; }
      .status {
        position: absolute;
        top: 16px; right: 16px;
        font-size: 11px;
        color: var(--muted);
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .status .dot {
        display: inline-block;
        width: 8px; height: 8px; border-radius: 50%;
        background: #4b5563;
        margin-right: 6px;
        vertical-align: 1px;
      }
      .status.online .dot { background: var(--green); }
    </style>
  </head>
  <body>
    <div class="topbar">
      <div class="brand">
        <span class="pulse"></span>
        Crisis Response · Guest Console
      </div>
      <a href="/staff.html">Staff Dashboard →</a>
    </div>

    <main>
      <div class="card">
        <div class="status" id="status"><span class="dot"></span>connecting</div>
        <h1>Emergency Assistance</h1>
        <p class="subtitle">Press and hold the button below to alert staff immediately.</p>

        <div class="field">
          <label for="room">Your Room Number</label>
          <input id="room" placeholder="e.g. 412" maxlength="16" autocomplete="off" />
        </div>

        <button class="sos" id="sos" disabled>
          EMERGENCY
          <small>SOS</small>
        </button>

        <p class="help">A staff member will be dispatched to your room.</p>
        <div class="toast" id="toast"></div>
      </div>
    </main>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script>
      const socket = io();
      const sosBtn = document.getElementById("sos");
      const roomInput = document.getElementById("room");
      const statusEl = document.getElementById("status");
      const toast = document.getElementById("toast");

      try {
        const saved = localStorage.getItem("crisis:room");
        if (saved) roomInput.value = saved;
      } catch (e) {}

      function setConnected(on) {
        statusEl.classList.toggle("online", on);
        statusEl.innerHTML =
          '<span class="dot"></span>' + (on ? "online" : "offline");
        sosBtn.disabled = !on;
      }

      socket.on("connect", () => setConnected(true));
      socket.on("disconnect", () => setConnected(false));

      socket.on("guest:sos:received", (alert) => {
        const t = new Date(alert.timestamp).toLocaleTimeString();
        toast.classList.add("show");
        toast.textContent =
          "SOS received for room " + alert.room + " at " + t + ". Help is on the way.";
        sosBtn.disabled = true;
        setTimeout(() => {
          toast.classList.remove("show");
          if (socket.connected) sosBtn.disabled = false;
        }, 6000);
      });

      sosBtn.addEventListener("click", () => {
        const room = roomInput.value.trim();
        if (!room) {
          roomInput.focus();
          roomInput.style.borderColor = "var(--red)";
          return;
        }
        try { localStorage.setItem("crisis:room", room); } catch (e) {}
        socket.emit("guest:sos", room);
        sosBtn.disabled = true;
      });
    </script>
  </body>
</html>
